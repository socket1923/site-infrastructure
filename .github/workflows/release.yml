name: Build and deploy

on:
  push:
    branches: [master]
    paths:
      - 'static-site/**'
      - 'scripts/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-release
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/socket1923/site-infrastructure

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Build and push immutable multi-architecture image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./static-site
          platforms: linux/amd64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    if: ${{ vars.ENABLE_PRODUCTION_DEPLOY == 'true' }}
    runs-on: [self-hosted, linux, socket23-deploy]
    environment: production
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy verified digest through restricted node11 command
        env:
          IMAGE_REF: ${{ env.IMAGE_NAME }}@${{ needs.build.outputs.digest }}
        run: /usr/local/bin/socket23-trigger-deploy "$IMAGE_REF"
