name: CI

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Validate site
        run: python3 scripts/validate_site.py

      - name: Validate Compose and Swarm manifests
        run: |
          docker compose -f static-site/compose.yaml config >/dev/null
          IMAGE_REF=ghcr.io/socket1923/site-infrastructure@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa \
            docker stack config -c static-site/stack.yaml >/dev/null

      - name: Lint workflows and shell scripts
        run: |
          docker run --rm -v "$PWD:/repo:ro" -w /repo \
            rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
          docker run --rm -v "$PWD:/repo:ro" -w /repo \
            koalaman/shellcheck-alpine@sha256:c82fe42504fbc9fc68f15d36638e5ee2324ebb8b94e96a3c4e395bf361c49183 \
            /bin/shellcheck scripts/smoke-test.sh deploy/node11-pull-deploy deploy/set-service-no-new-privileges

      - name: Scan repository for secrets
        run: |
          docker run --rm -v "$PWD:/repo:ro" \
            ghcr.io/gitleaks/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            detect --source /repo --redact

      - name: Build and smoke-test amd64 image
        run: scripts/smoke-test.sh socket23-site:ci

      - name: Scan built image
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy@sha256:cffe3f5161a47a6823fbd23d985795b3ed72a4c806da4c4df16266c02accdd6f \
            image --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 socket23-site:ci

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Verify multi-architecture build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./static-site
          platforms: linux/amd64,linux/arm/v7
          push: false
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
