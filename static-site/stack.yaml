services:
  web:
    image: ${IMAGE_REF:-ghcr.io/socket1923/site-infrastructure:latest}
    user: "101:101"
    ports:
      - target: 8443
        published: 443
        protocol: tcp
        mode: ingress
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
      - /var/cache/nginx:size=8m,uid=101,gid=101,mode=0750
    secrets:
      - source: tls_fullchain
        target: tls_fullchain.pem
        uid: "101"
        gid: "101"
        mode: 0444
      - source: tls_privkey
        target: tls_privkey.pem
        uid: "101"
        gid: "101"
        mode: 0400
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://127.0.0.1:8443/ >/dev/null"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      mode: replicated
      replicas: 2
      placement:
        max_replicas_per_node: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 5s
        order: stop-first
        monitor: 30s
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
        reservations:
          memory: 32M

secrets:
  tls_fullchain:
    external: true
    name: ${TLS_FULLCHAIN_SECRET:-socket23_tls_fullchain}
  tls_privkey:
    external: true
    name: ${TLS_PRIVKEY_SECRET:-socket23_tls_privkey}
