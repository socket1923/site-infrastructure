services:
  web:
    build:
      context: .
    image: socket23-site:local
    user: "101:101"
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:8443:8443"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
      - /var/cache/nginx:size=8m,uid=101,gid=101,mode=0750
    secrets:
      - source: tls_fullchain
        target: tls_fullchain.pem
        uid: "101"
        gid: "101"
        mode: 0444
      - source: tls_privkey
        target: tls_privkey.pem
        uid: "101"
        gid: "101"
        mode: 0400
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://127.0.0.1:8443/ >/dev/null"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
        reservations:
          memory: 32M

secrets:
  tls_fullchain:
    file: ${TLS_FULLCHAIN_FILE:-./.test-certs/fullchain.pem}
  tls_privkey:
    file: ${TLS_PRIVKEY_FILE:-./.test-certs/privkey.pem}
